# =========================================================================
# CRE WORKFLOW SETTINGS — wf-goal-verification
# =========================================================================
# Per-target workflow settings for the cre CLI. Schema matches the official
# Chainlink confidential-ai-attester / minimal-cre-examples http-trigger
# template:
#   <target>:
#     user-workflow:      { workflow-name }
#     workflow-artifacts: { workflow-path, config-path, secrets-path }
# Paths are relative to this file.
#
# Callback architecture: the workflow's HTTP trigger IS the Confidential AI
# Attester's cre_callback endpoint. No Vault DON secret is needed — the inference
# (and its API key) live on the app side (cre/scripts/call-attester.mjs), not in
# the workflow. So secrets-path is empty for every target.
# =========================================================================

local-simulation:
  user-workflow:
    workflow-name: "wf-goal-verification"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.json"
    secrets-path: ""

staging-settings:
  user-workflow:
    workflow-name: "wf-goal-verification"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.json"
    secrets-path: ""
