# =========================================================================
# CRE WORKFLOW SETTINGS — wf-goal-verification
# =========================================================================
# Per-target workflow settings for the cre CLI. Schema matches the official
# Chainlink minimal-cre-examples http-trigger template:
#   <target>:
#     user-workflow:      { workflow-name }
#     workflow-artifacts: { workflow-path, config-path, secrets-path }
# Paths are relative to this file.
# =========================================================================

local-simulation:
  user-workflow:
    workflow-name: "wf-goal-verification"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.json"
    # No secrets needed for the mock-judge simulation path (config.useMockJudge=true).
    secrets-path: ""

staging-settings:
  user-workflow:
    workflow-name: "wf-goal-verification"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.json"
    # Live judge call needs the judgeApiKey secret provisioned in the Vault DON.
    secrets-path: "../secrets.yaml"
